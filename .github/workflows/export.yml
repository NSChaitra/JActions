name: export-solution-on-main
# Export solution from DEV environment
#  unpack it and prepare, commit and push a git branch with the changes

on:
  workflow_dispatch:
    inputs:
      # Change this value
      solution_name:
        description: 'name of the solution to worked on from Power Platform'
        required: true
        default: Test
       #Do Not change these values
      solution_exported_folder:
        description: 'folder name for staging the exported solution *do not change*'
        required: true
        default: /out
      solution_folder:
        description: 'staging the unpacked solution folder before check-in *do not change*'
        required: true
        default: /solution
      solution_target_folder: 
       description: 'folder name to be created and checked in *do not change*'
       required: true
       default: solution
env:
#edit your values here
  ENVIRONMENT_URL: 'https://org26907746.crm.dynamics.com/'
  CLIENT_ID: '4fec5240-fd45-408b-8276-d60c97798c49'
  TENANT_ID: 'db05faca-c82a-4b9d-b9c5-0f64b6755421'
permissions:
  contents: write
jobs:
  export-from-dev:
    runs-on: windows-latest
    # or you can say runs-on: ubuntu-latest
    env:
      RUNNER_DEBUG: 1

    steps:
    - name: Install Power Platform Tools
      uses: microsoft/powerplatform-actions/actions-install@v1

    - name: who-am-i action
      uses: microsoft/powerplatform-actions/who-am-i@v1
      with:
        environment-url: ${{env.ENVIRONMENT_URL}}
        app-id: ${{env.CLIENT_ID}}
        client-secret: ${{ secrets.PASSWORD }}
        tenant-id: ${{env.TENANT_ID}}
        
    

    - name: export-solution action
      uses: microsoft/powerplatform-actions/export-solution@v1
      with:
        environment-url: ${{env.ENVIRONMENT_URL}}
        app-id: ${{env.CLIENT_ID}}
        client-secret: ${{ secrets.PASSWORD }}
        tenant-id: ${{env.TENANT_ID}}
        solution-name: ${{ github.event.inputs.solution_name }}
        solution-output-file: ${{ github.event.inputs.solution_exported_folder}}/${{ github.event.inputs.solution_name }}.zip

    - name: unpack-solution action
      uses: microsoft/powerplatform-actions/unpack-solution@v1
      with:
        solution-file: ${{ github.event.inputs.solution_exported_folder}}/${{ github.event.inputs.solution_name }}.zip
        solution-folder: ${{ github.event.inputs.solution_folder}}/${{ github.event.inputs.solution_name }}
        solution-type: 'Unmanaged'
        overwrite-files: true
            
       
    - name: Commit changes
      shell: pwsh
      working-directory: ${{ github.workspace }}
      run: |
        $ErrorActionPreference = "Stop"
    
        if (!(Test-Path ".git")) { throw "Not a git repository. Run actions/checkout first." }
    
        $src = Join-Path "${{ github.event.inputs.solution_folder }}" "${{ github.event.inputs.solution_name }}"
        $dst = Join-Path "$env:GITHUB_WORKSPACE" (Join-Path "${{ github.event.inputs.solution_folder }}" "${{ github.event.inputs.solution_name }}")
    
        New-Item -ItemType Directory -Force -Path (Split-Path $dst -Parent) | Out-Null
        Copy-Item -Path $src -Destination $dst -Recurse -Force
    
        git config user.email "no-reply@github.com"
        git config user.name "GitHub Actions"
    
        git fetch origin main
        git checkout main
        git pull origin main
    
        git add --all
    
        if (git diff --cached --quiet) {
          Write-Host "No changes to commit."
        }
        else {
          git commit -m "Updates from the dev environment"
    
          # IMPORTANT: Quote the URL
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin main
        }
    
