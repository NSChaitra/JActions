name: Export All Solution Details (Inventory + Optional ZIPs)

on:
  workflow_dispatch:
    inputs:
      export_zips:
        description: "Also export all solutions as ZIPs?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      export_managed:
        description: "If exporting ZIPs: export managed solutions too?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      export_unmanaged:
        description: "If exporting ZIPs: export unmanaged solutions too?"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  export_solution_details:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_CLIENT_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------
      # Install PAC CLI
      # -------------------------------------------------
      - name: Install Power Platform CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify PAC
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          where pac
          pac help

      # -------------------------------------------------
      # Authenticate
      # -------------------------------------------------
      - name: Authenticate
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          pac auth create `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --clientId "$env:PP_CLIENT_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          pac auth list

      - name: Prepare output folders
        shell: pwsh
        run: |
          New-Item out -ItemType Directory -Force | Out-Null
          New-Item out/exports -ItemType Directory -Force | Out-Null

      # -------------------------------------------------
      # ✅ Inventory (TEXT PARSING – WORKS EVERYWHERE)
      # -------------------------------------------------
      - name: Export solution inventory
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          $ErrorActionPreference = "Stop"

          Write-Host "Running pac solution list..."
          pac solution list > out/solutions_raw.txt

          $lines = Get-Content out/solutions_raw.txt | Where-Object { $_.Trim() -ne "" }

          # Skip headers (first 2 lines usually)
          $dataLines = $lines | Select-Object -Skip 2

          $solutions = foreach ($line in $dataLines) {

            # Split on 2+ spaces (CLI table format)
            $parts = $line -split '\s{2,}'
            if ($parts.Count -ge 4) {
              [pscustomobject]@{
                UniqueName  = $parts[0]
                DisplayName = $parts[1]
                Version     = $parts[2]
                IsManaged   = $parts[3]
              }
            }
          }

          if (-not $solutions) {
            throw "No solutions parsed. Check out/solutions_raw.txt"
          }

          $solutions | ConvertTo-Json -Depth 5 |
            Out-File out/solution_inventory.json -Encoding utf8

          $solutions | Export-Csv `
            -Path out/solution_inventory.csv `
            -NoTypeInformation `
            -Encoding utf8

          Write-Host "✅ Solutions exported:" $solutions.Count

      # -------------------------------------------------
      # Optional ZIP export
      # -------------------------------------------------
      - name: Export solution ZIPs
        if: ${{ inputs.export_zips == 'true' }}
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          $solutions = Get-Content out/solution_inventory.json | ConvertFrom-Json

          foreach ($s in $solutions) {

            if ("${{ inputs.export_unmanaged }}" -eq "true") {
              pac solution export `
                --name $s.UniqueName `
                --path "out/exports/$($s.UniqueName)_unmanaged.zip" `
                --overwrite
            }

            if ("${{ inputs.export_managed }}" -eq "true") {
              pac solution export `
                --name $s.UniqueName `
                --path "out/exports/$($s.UniqueName)_managed.zip" `
                --managed `
                --overwrite
            }
          }

      - name: Upload inventory
        uses: actions/upload-artifact@v4
        with:
          name: solution-inventory
          path: |
            out/solutions_raw.txt
            out/solution_inventory.json
            out/solution_inventory.csv

      - name: Upload ZIPs
        if: ${{ inputs.export_zips == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: solution-exports
          path: out/exports/*.zip
