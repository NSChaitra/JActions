        if: ${{ inputs.export_zips == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          $solutions = Get-Content out/solution_inventory.json -Raw | ConvertFrom-Json

          foreach ($s in $solutions) {

            if ("${{ inputs.export_unmanaged }}" -eq "true") {
              Write-Host "Exporting unmanaged: $($s.UniqueName)"
              pac solution export `
