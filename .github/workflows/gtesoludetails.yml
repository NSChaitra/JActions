name: Export All new Solution Details (Inventory + Optional ZIPs)

on:
  workflow_dispatch:
    inputs:
      export_zips:
        description: "Also export all solutions as ZIPs?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      export_managed:
        description: "If exporting ZIPs: export managed solutions too?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      export_unmanaged:
        description: "If exporting ZIPs: export unmanaged solutions too?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  export_solution_details:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_CLIENT_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
