      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

      PP_TOOLS_TELEMETRY_OPTOUT: "1"
      PP_TOOLS_NO_LOGO: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # ✅ Install PAC CLI via .NET tool
      # -------------------------------------------------
      - name: Install Power Platform CLI (PAC) - .NET Tool
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          dotnet --info

          # Install PAC CLI as dotnet global tool
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool

          # Ensure dotnet tools path is available to subsequent steps
          $toolPath = "$env:USERPROFILE\.dotnet\tools"
          echo $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # -------------------------------------------------
      # ✅ Verify pac (FIXED: do NOT use pac --version)
      # -------------------------------------------------
      - name: Verify pac (safe)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          Write-Host "Resolved pac location:"
          where.exe pac

          Write-Host "Dotnet global tools:"
          dotnet tool list -g

          Write-Host "PAC help output (also confirms it runs):"
          pac help

      # -------------------------------------------------
      # ✅ Authenticate using Service Principal
      # -------------------------------------------------
      - name: Authenticate to Power Platform
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          pac auth create `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --clientId "$env:PP_CLIENT_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          pac auth list

      - name: Create output folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          New-Item -ItemType Directory -Force -Path out/exports | Out-Null

      # -------------------------------------------------
      # 1️⃣ Inventory: JSON + CSV (robust JSON handling)
      # -------------------------------------------------
      - name: Export solution inventory (JSON + CSV)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          Write-Host "Exporting solution inventory..."

          # Redirect to file to avoid banner/noise breaking JSON parsing
          pac solution list --output json > out/solutions_raw.json

          $raw = Get-Content out/solutions_raw.json -Raw

          if (-not ($raw.TrimStart().StartsWith("{") -or $raw.TrimStart().StartsWith("["))) {
            Write-Host "PAC did not return pure JSON. First 500 chars:"
            Write-Host ($raw.Substring(0, [Math]::Min(500, $raw.Length)))
            throw "PAC output is not valid JSON. Check out/solutions_raw.json artifact."
          }

          $data = $raw | ConvertFrom-Json

          # Normalize: sometimes array, sometimes wrapped
          if ($data -is [System.Collections.IEnumerable] -and $data -isnot [pscustomobject]) {
            $list = $data
          } elseif ($null -ne $data.value) {
            $list = $data.value
          } else {
            $list = $data
          }

          $solutions = $list | ForEach-Object {
            [pscustomobject]@{
              UniqueName  = $_.uniqueName
              DisplayName = $_.friendlyName
              Version     = $_.version
              IsManaged   = $_.isManaged
            }
          }

          $solutions | ConvertTo-Json -Depth 10 | Out-File out/solution_inventory.json -Encoding utf8
          $solutions | Export-Csv -NoTypeInformation out/solution_inventory.csv -Encoding utf8

          Write-Host "✅ Total solutions:" $solutions.Count

      # -------------------------------------------------
      # 2️⃣ Optional: Export ZIPs
      # -------------------------------------------------
