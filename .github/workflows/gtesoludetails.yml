name: Export Solution Inventory (Text Safe)

on:
  workflow_dispatch:
    inputs:
      export_zips:
        description: "Export all solutions as ZIP files?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  export_solutions:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_CLIENT_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      # -------------------------------
      # Checkout
      # -------------------------------
      - uses: actions/checkout@v4

      # -------------------------------
      # Install PAC CLI (dotnet tool)
      # -------------------------------
      - name: Install PAC CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          dotnet tool install --global Microsoft.PowerApps.CLI.Tool

          "$env:USERPROFILE\.dotnet\tools" |
            Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      # -------------------------------
      # Verify PAC (NO --version)
      # -------------------------------
      - name: Verify PAC
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          where pac
          pac help

      # -------------------------------
      # Authenticate
      # -------------------------------
      - name: Authenticate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          pac auth create `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --clientId "$env:PP_CLIENT_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          pac auth list

      # -------------------------------
      # Prepare folders
      # -------------------------------
      - name: Create folders
        shell: pwsh
        run: |
          New-Item out -ItemType Directory -Force | Out-Null
          New-Item out/exports -ItemType Directory -Force | Out-Null

      # --------------------------------------------------
      # ✅ SOLUTION INVENTORY (FINAL SAFE LOGIC)
      # --------------------------------------------------
      - name: Export solution inventory (text‑safe)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          Write-Host "Running: pac solution list"
          pac solution list --includeSystemSolutions > out/solutions_raw.txt

          $lines = Get-Content out/solutions_raw.txt

          # Find LAST separator line (-----)
          $separator = $lines |
            Select-String '^-{3,}' |
            Select-Object -Last 1

          if (-not $separator) {
            throw "Separator line not found. Check solutions_raw.txt"
          }

          # Data starts after separator
          $startIndex = $separator.LineNumber
          $dataLines = $lines | Select-Object -Skip $startIndex

          $solutions = @()

          foreach ($line in $dataLines) {

            if ($line.Trim() -eq "") { continue }

            # Split table columns on 2+ spaces
            $cols = $line -split '\s{2,}'

            if ($cols.Count -lt 4) { continue }

            $solutions += [pscustomobject]@{
              UniqueName  = $cols[0]
              DisplayName = $cols[1]
              Version     = $cols[2]
              IsManaged   = $cols[-1]
            }
          }

          if ($solutions.Count -eq 0) {
            throw "No solutions parsed. Inspect out/solutions_raw.txt"
          }

          $solutions |
            ConvertTo-Json -Depth 5 |
            Out-File out/solution_inventory.json -Encoding utf8

          $solutions |
            Export-Csv out/solution_inventory.csv `
            -NoTypeInformation `
            -Encoding utf8

          Write-Host "✅ Solutions exported:" $solutions.Count

      # --------------------------------------------------
      # Optional ZIP Export
      # --------------------------------------------------
      - name: Export ZIPs
        if: ${{ inputs.export_zips == 'true' }}
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          $solutions = Get-Content out/solution_inventory.json |
            ConvertFrom-Json

          foreach ($s in $solutions) {
            Write-Host "Exporting: $($s.UniqueName)"

            pac solution export `
              --name $s.UniqueName `
              --path "out/exports/$($s.UniqueName).zip" `
              --overwrite
          }

      # --------------------------------------------------
      # Upload artifacts
      # --------------------------------------------------
      - name: Upload inventory
        uses: actions/upload-artifact@v4
        with:
          name: solution-inventory
          path: |
            out/solutions_raw.txt
            out/solution_inventory.json
            out/solution_inventory.csv

      - name: Upload ZIPs
        if: ${{ inputs.export_zips == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: solution-zips
          path: out/exports/*.zip
