on:
  workflow_dispatch:
    inputs:
      export_zips:
        description: "Also export all solutions as ZIPs?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      export_managed:
        description: "If exporting ZIPs: export managed solutions too?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      export_unmanaged:
        description: "If exporting ZIPs: export unmanaged solutions too?"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
