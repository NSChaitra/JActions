name: Export Solution Inventory (FINAL – CI SAFE)

on:
  workflow_dispatch:
    inputs:
      export_zips:
        description: "Export solution ZIPs?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  export_solutions:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_CLIENT_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      # ----------------------------------
      # Checkout
      # ----------------------------------
      - uses: actions/checkout@v4

      # ----------------------------------
      # Install PAC CLI
      # ----------------------------------
      - name: Install PAC CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          "$env:USERPROFILE\.dotnet\tools" |
            Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      # ----------------------------------
      # Verify PAC
      # ----------------------------------
      - name: Verify PAC
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          where pac
          pac help

      # ----------------------------------
      # ✅ AUTHENTICATION (FIXED)
      # ----------------------------------
      - name: Authenticate to Power Platform
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          pac auth create `
            --name ci-profile `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --clientId "$env:PP_CLIENT_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          # ✅ EXPLICITLY SELECT PROFILE (CRITICAL)
          pac auth select --name ci-profile

          pac auth list

      # ----------------------------------
      # Prepare folders
      # ----------------------------------
      - name: Prepare folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          New-Item -ItemType Directory -Force out/exports | Out-Null

      # ----------------------------------
      # ✅ SOLUTION INVENTORY (FINAL SAFE)
      # ----------------------------------
      - name: Export solution inventory
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          Write-Host "Running pac solution list..."
          pac solution list --includeSystemSolutions > out/solutions_raw.txt

          $lines = Get-Content out/solutions_raw.txt
          $solutions = @()

          foreach ($line in $lines) {

            if ($line.Trim() -eq "") { continue }

            # Skip auth/banner lines
            if ($line -match 'auth|profile|Power Platform|Listing|Environment') {
              continue
            }

            # Split on 2+ spaces
            $cols = $line -split '\s{2,}'

            if ($cols.Count -lt 3) { continue }

            $solutions += [pscustomobject]@{
              UniqueName  = $cols[0]
              DisplayName = $cols[1]
              Version     = $cols[2]
              IsManaged   = if ($cols[-1] -match 'true|false|yes|no') { $cols[-1] } else { "" }
            }
          }

          if ($solutions.Count -eq 0) {
            Write-Host "⚠️ No solutions parsed. Uploading raw output only."
          } else {
            $solutions | ConvertTo-Json -Depth 5 |
              Out-File out/solution_inventory.json -Encoding utf8

            $solutions | Export-Csv `
              -Path out/solution_inventory.csv `
              -NoTypeInformation `
              -Encoding utf8
          }

      # ----------------------------------
      # Optional ZIP export
      # ----------------------------------
      - name: Export ZIPs
        if: ${{ inputs.export_zips == 'true' }}
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          if (Test-Path out/solution_inventory.json) {
            $solutions = Get-Content out/solution_inventory.json | ConvertFrom-Json
            foreach ($s in $solutions) {
              pac solution export `
                --name $s.UniqueName `
                --path "out/exports/$($s.UniqueName).zip" `
                --overwrite
            }
          }

      # ----------------------------------
      # Upload artifacts
      # ----------------------------------
      - name: Upload inventory
        uses: actions/upload-artifact@v4
        with:
          name: solution-inventory
          path: out/
