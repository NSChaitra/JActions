name: Export All new Solution Details (Inventory + Optional ZIPs)

on:
  workflow_dispatch:
    inputs:
      export_zips:
        description: "Also export all solutions as ZIPs?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      export_managed:
        description: "If exporting ZIPs: export managed solutions too?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      export_unmanaged:
        description: "If exporting ZIPs: export unmanaged solutions too?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  export_solution_details:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_CLIENT_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # ✅ Install PAC CLI via .NET tool (no Store dependency)
      # -------------------------------------------------
      - name: Install Power Platform CLI (PAC) - .NET Tool
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          dotnet --info

          # Install PAC CLI as dotnet global tool (recommended & simplest)
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool

          # Ensure dotnet tools path is available to subsequent steps
          $toolPath = "$env:USERPROFILE\.dotnet\tools"
          echo $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify pac
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          where.exe pac
          pac --version

      # -------------------------------------------------
      # ✅ Authenticate using Service Principal
      # -------------------------------------------------
      - name: Authenticate to Power Platform
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          pac auth create `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --clientId "$env:PP_CLIENT_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          pac auth list

      - name: Create output folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          New-Item -ItemType Directory -Force -Path out/exports | Out-Null

      # -------------------------------------------------
      # 1️⃣ Inventory: JSON + CSV
      # -------------------------------------------------
      - name: Export solution inventory (JSON + CSV)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          try {
            Write-Host "Trying JSON output..."
            $solutions = pac solution list --json | ConvertFrom-Json
            $solutions = $solutions | ForEach-Object {
              [pscustomobject]@{
                UniqueName  = $_.uniqueName
                DisplayName = $_.friendlyName
                Version     = $_.version
                IsManaged   = $_.isManaged
              }
            }
          } catch {
            Write-Host "JSON not supported – parsing table output..."
            $lines = pac solution list | Out-String
            $rows = $lines -split "`r?`n" | Select-Object -Skip 2

            $solutions = foreach ($row in $rows) {
              $parts = ($row -split "\s{2,}") | Where-Object { $_ }
              if ($parts.Count -ge 4) {
                [pscustomobject]@{
                  UniqueName  = $parts[0]
                  DisplayName = $parts[1]
                  Version     = $parts[2]
                  IsManaged   = $parts[3]
                }
              }
            }
          }

          $solutions | ConvertTo-Json -Depth 10 | Out-File out/solution_inventory.json -Encoding utf8
          $solutions | Export-Csv -NoTypeInformation out/solution_inventory.csv -Encoding utf8

          Write-Host "Total solutions:" $solutions.Count

      # -------------------------------------------------
      # 2️⃣ Optional: Export ZIPs
      # -------------------------------------------------
      - name: Export solution ZIPs
        if: ${{ inputs.export_zips == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          $solutions = Get-Content out/solution_inventory.json | ConvertFrom-Json

          foreach ($s in $solutions) {

            if ("${{ inputs.export_unmanaged }}" -eq "true") {
              pac solution export `
                --name $s.UniqueName `
                --path "out/exports/$($s.UniqueName)_unmanaged.zip" `
                --managed false `
                --overwrite
            }

            if ("${{ inputs.export_managed }}" -eq "true") {
              pac solution export `
                --name $s.UniqueName `
                --path "out/exports/$($s.UniqueName)_managed.zip" `
                --managed true `
                --overwrite
            }
          }

      - name: Upload solution inventory
        uses: actions/upload-artifact@v4
        with:
          name: solution-inventory
          path: |
            out/solution_inventory.json
            out/solution_inventory.csv

      - name: Upload solution ZIPs
        if: ${{ inputs.export_zips == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: solution-exports
          path: out/exports/*.zip
