name: Export All Solution Details (Inventory + Optional ZIPs)

on:
  workflow_dispatch:
    inputs:
      export_zips:
        description: "Also export all solutions as ZIPs?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      export_managed:
        description: "If exporting ZIPs: export managed solutions too?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      export_unmanaged:
        description: "If exporting ZIPs: export unmanaged solutions too?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  export_solution_details:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_CLIENT_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Install PAC CLI using official Power Platform action
      - name: Install Power Platform Tools (PAC)
        uses: microsoft/powerplatform-actions/actions-install@v1
        # Must be added before other Power Platform operations [1](https://github.com/marketplace/actions/powerplatform-actions)

      # ✅ Authenticate for PAC CLI (service principal)
      - name: Authenticate (PAC CLI)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          pac auth create `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --clientId "$env:PP_CLIENT_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          pac auth list

      - name: Create output folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          New-Item -ItemType Directory -Force -Path out/exports | Out-Null

      # -----------------------------
      # 1) INVENTORY: Get all solution details
      # -----------------------------
      - name: Get all solution details (JSON + CSV)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Trying to fetch solutions as JSON (if supported)..."
          $jsonSupported = $true
          try {
            $raw = pac solution list --json 2>$null
            if (-not $raw) { throw "Empty JSON output" }
            $solutions = $raw | ConvertFrom-Json
          } catch {
            $jsonSupported = $false
            Write-Host "JSON output not supported, falling back to parsing table..."

            $lines = pac solution list | Out-String
            $rows = $lines -split "`r?`n" | Where-Object { $_.Trim() -ne "" }

            # Skip header lines; parse rows
            $dataLines = $rows | Where-Object { $_ -match "\S" } | Select-Object -Skip 2

            $solutions = @()
            foreach ($l in $dataLines) {
              $parts = ($l -split "\s{2,}") | Where-Object { $_ -ne "" }
              if ($parts.Count -ge 4) {
                $solutions += [pscustomobject]@{
                  UniqueName  = $parts[0]
                  DisplayName = $parts[1]
                  Version     = $parts[2]
                  IsManaged   = $parts[3]
                }
              }
            }
          }

          # Normalize if JSON format differs
          if ($jsonSupported) {
            $solutions = $solutions | ForEach-Object {
              [pscustomobject]@{
                UniqueName  = $_.uniqueName  ?? $_.UniqueName
                DisplayName = $_.friendlyName ?? $_.displayName ?? $_.DisplayName
                Version     = $_.version     ?? $_.Version
                IsManaged   = $_.isManaged   ?? $_.IsManaged
              }
            }
          }

          # Write outputs
          $solutions | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 "out/solution_inventory.json"
          $solutions | Export-Csv -NoTypeInformation -Encoding utf8 "out/solution_inventory.csv"

          Write-Host "Solution count:" ($solutions.Count)

      # -----------------------------------------
      # 2) OPTIONAL: Export all solutions as ZIPs
      # -----------------------------------------
      - name: Export all solution ZIPs (optional)
        if: ${{ inputs.export_zips == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exportManaged   = "${{ inputs.export_managed }}" -eq "true"
          $exportUnmanaged = "${{ inputs.export_unmanaged }}" -eq "true"

          $solutions = Get-Content "out/solution_inventory.json" | ConvertFrom-Json

          foreach ($s in $solutions) {
            $unique = $s.UniqueName

            if ($exportUnmanaged) {
              $outFile = "out/exports/$($unique)_unmanaged.zip"
              Write-Host "Exporting UNMANAGED: $unique -> $outFile"
              pac solution export --name $unique --path $outFile --managed false --overwrite
            }

            if ($exportManaged) {
              $outFile = "out/exports/$($unique)_managed.zip"
              Write-Host "Exporting MANAGED: $unique -> $outFile"
              pac solution export --name $unique --path $outFile --managed true --overwrite
            }
          }

      # Upload inventory files
      - name: Upload solution inventory artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solution-inventory
          path: |
            out/solution_inventory.json
            out/solution_inventory.csv

      # Upload solution exports if enabled
      - name: Upload solution ZIP exports
        if: ${{ inputs.export_zips == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: solution-exports
          path: out/exports/*.zip
