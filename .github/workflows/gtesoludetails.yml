name: Export Solution Inventory (Ultra‑Robust)

on:
  workflow_dispatch:
    inputs:
      export_zips:
        description: "Export solutions as ZIP files?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  export_solutions:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_CLIENT_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      # ---------------------------------
      # Checkout
      # ---------------------------------
      - uses: actions/checkout@v4

      # ---------------------------------
      # Install PAC CLI
      # ---------------------------------
      - name: Install PAC CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          "$env:USERPROFILE\.dotnet\tools" |
            Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      # ---------------------------------
      # Verify PAC
      # ---------------------------------
      - name: Verify PAC
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          where pac
          pac help

      # ---------------------------------
      # Authenticate
      # ---------------------------------
      - name: Authenticate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          pac auth create `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --clientId "$env:PP_CLIENT_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          pac auth list

      # ---------------------------------
      # Prepare folders
      # ---------------------------------
      - name: Prepare folders
        shell: pwsh
        run: |
          New-Item out -ItemType Directory -Force | Out-Null
          New-Item out/exports -ItemType Directory -Force | Out-Null

      # ---------------------------------
      # ✅ SOLUTION INVENTORY (FINAL LOGIC)
      # ---------------------------------
      - name: Export solution inventory
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          pac solution list --includeSystemSolutions > out/solutions_raw.txt

          $lines = Get-Content out/solutions_raw.txt
          $solutions = @()

          foreach ($line in $lines) {

            if ($line.Trim() -eq "") { continue }

            # Skip obvious header / banner lines
            if ($line -match 'Solution|Friendly|Version|Managed|Power Platform|Listing') {
              continue
            }

            # Split on 2+ spaces
            $parts = $line -split '\s{2,}'

            # Heuristic: valid solution rows have at least 3 columns
            if ($parts.Count -lt 3) { continue }

            # Managed flag is usually last column if present
            $managed =
              if ($parts[-1] -match 'true|false|yes|no') { $parts[-1] }
              else { "" }

            $solutions += [pscustomobject]@{
              UniqueName  = $parts[0]
              DisplayName = $parts[1]
              Version     = $parts[2]
              IsManaged   = $managed
            }
          }

          if ($solutions.Count -eq 0) {
            Write-Host "No solutions detected. Raw output below:"
            Get-Content out/solutions_raw.txt | Select-Object -First 30
            throw "Parsing failed – inspect solutions_raw.txt"
          }

          $solutions |
            ConvertTo-Json -Depth 5 |
            Out-File out/solution_inventory.json -Encoding utf8

          $solutions |
            Export-Csv out/solution_inventory.csv `
              -NoTypeInformation `
              -Encoding utf8

          Write-Host "✅ Solutions exported:" $solutions.Count

      # ---------------------------------
      # Optional ZIP export
      # ---------------------------------
      - name: Export ZIPs
        if: ${{ inputs.export_zips == 'true' }}
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          $solutions = Get-Content out/solution_inventory.json |
            ConvertFrom-Json

          foreach ($s in $solutions) {
            pac solution export `
              --name $s.UniqueName `
              --path "out/exports/$($s.UniqueName).zip" `
              --overwrite
          }

      # ---------------------------------
      # Upload artifacts
      # ---------------------------------
      - name: Upload inventory
        uses: actions/upload-artifact@v4
        with:
          name: solution-inventory
          path: |
            out/solutions_raw.txt
            out/solution_inventory.json
            out/solution_inventory.csv

      - name: Upload zips
        if: ${{ inputs.export_zips == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: solution-zips
          path: out/exports/*.zip
