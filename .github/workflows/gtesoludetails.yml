name: Export Solution Inventory (FINAL – STABLE)

on:
  workflow_dispatch:

jobs:
  export_solutions:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://prodev-prod.crm.dynamics.com/"
      PP_APPLICATION_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      # ---------------------------------
      # Checkout
      # ---------------------------------
      - uses: actions/checkout@v4

      # ---------------------------------
      # Install PAC CLI (dotnet tool)
      # ---------------------------------
      - name: Install Power Platform CLI
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          "$env:USERPROFILE\.dotnet\tools" |
            Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      # ---------------------------------
      # Authenticate (PAC 2.6.3 compatible)
      # ---------------------------------
      - name: Authenticate to Power Platform
        shell: pwsh
        run: |
          pac auth create `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --applicationId "$env:PP_APPLICATION_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          pac auth list

      # ---------------------------------
      # Export solution list (RAW)
      # ---------------------------------
      - name: Export solution list (raw)
        shell: pwsh
        continue-on-error: true
        run: |
          pac solution list `
            --environment "$env:PP_ENV_URL" `
            --includeSystemSolutions `
            > solutions_raw.txt

      # ---------------------------------
      # ✅ Parse solution inventory (SAFE)
      # ---------------------------------
      - name: Parse solution inventory
        shell: pwsh
        continue-on-error: true
        run: |
          $lines = Get-Content solutions_raw.txt

          # Your output:
          # Line 1: "Listing all Solutions..."
          # Line 2: Header row
          # Data starts from line 3
          $dataLines = $lines | Select-Object -Skip 2

          $solutions = @()

          foreach ($line in $dataLines) {

            if ($line.Trim() -eq "") { continue }

            # Split on 2+ spaces (matches your output exactly)
            $parts = $line -split '\s{2,}'

            if ($parts.Count -lt 4) { continue }

            $solutions += [pscustomobject]@{
              UniqueName  = $parts[0]
              DisplayName = $parts[1]
              Version     = $parts[2]
              IsManaged   = $parts[3]
            }
          }

          if ($solutions.Count -gt 0) {
            $solutions |
              ConvertTo-Json -Depth 5 |
              Out-File solution_inventory.json -Encoding utf8

            $solutions |
              Export-Csv solution_inventory.csv `
                -NoTypeInformation `
                -Encoding utf8

            Write-Host "✅ Parsed solutions:" $solutions.Count
          } else {
            Write-Host "⚠️ No solutions parsed. Raw output preserved."
          }

      # ---------------------------------
      # Upload artifacts (ALWAYS)
      # ---------------------------------
      - name: Upload inventory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solution-inventory
          path: |
            solutions_raw.txt
            solution_inventory.json
            solution_inventory.csv
