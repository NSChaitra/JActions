name: Export Solution Inventory (FINAL – AUTH FIXED FOR PAC 2.6.3)

on:
  workflow_dispatch:

jobs:
  export_solutions:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_APPLICATION_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      # ----------------------------------
      # Checkout
      # ----------------------------------
      - uses: actions/checkout@v4

      # ----------------------------------
      # Install PAC CLI
      # ----------------------------------
      - name: Install PAC CLI
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          "$env:USERPROFILE\.dotnet\tools" |
            Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      # ----------------------------------
      # Verify PAC
      # ----------------------------------
      - name: Verify PAC
        shell: pwsh
        run: |
          pac help

      # ----------------------------------
      # ✅ AUTHENTICATION (CORRECT FOR v2.6.3)
      # ----------------------------------
      - name: Authenticate to Power Platform
        shell: pwsh
        run: |
          pac auth create `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --applicationId "$env:PP_APPLICATION_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          pac auth list

      # ----------------------------------
      # ✅ SOLUTION LIST (NOW WORKS)
      # ----------------------------------
      - name: Export solution list
        shell: pwsh
        run: |
          pac solution list `
            --environment "$env:PP_ENV_URL" `
