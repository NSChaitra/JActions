name: Export Solution Inventory (FINAL – VERIFIED)

on:
  workflow_dispatch:

jobs:
  export_solutions:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_APPLICATION_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Install PAC CLI
      # ----------------------------
      - name: Install PAC CLI
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          "$env:USERPROFILE\.dotnet\tools" |
            Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      # ----------------------------
      # Authenticate (PAC 2.6.3 compatible)
      # ----------------------------
      - name: Authenticate to Power Platform
        shell: pwsh
        run: |
          pac auth create `
            --url "$env:PP_ENV_URL" `
            --tenant "$env:PP_TENANT_ID" `
            --applicationId "$env:PP_APPLICATION_ID" `
            --clientSecret "$env:PP_CLIENT_SECRET"

          pac auth list

      # ----------------------------
      # Export raw solution list
      # ----------------------------
      - name: Export solution list (raw)
        shell: pwsh
        run: |
          pac solution list `
            --environment "$env:PP_ENV_URL" `
            --includeSystemSolutions `
            > solutions_raw.txt

      # ----------------------------
      # ✅ PARSE OUTPUT (MATCHES YOUR FORMAT)
      # ----------------------------
      - name: Parse solution inventory
        shell: pwsh
        run: |
          $lines = Get-Content solutions_raw.txt

          # Skip first 2 lines (banner + header)
          $dataLines = $lines | Select-Object -Skip 2

          $solutions = foreach ($line in $dataLines) {
            if ($line.Trim() -eq "") { continue }

            [pscustomobject]@{
              UniqueName  = $line.Substring(0, 25).Trim()
              DisplayName = $line.Substring(25, 40).Trim()
              Version     = $line.Substring(65, 15).Trim()
              IsManaged   = $line.Substring(80).Trim()
            }
          }

          $solutions | ConvertTo-Json -Depth 5 |
            Out-File solution_inventory.json -Encoding utf8

          $solutions | Export-Csv `
            -Path solution_inventory.csv `
            -NoTypeInformation `
            -Encoding utf8

          Write-Host "✅ Parsed solutions:" $solutions.Count

      # ----------------------------
      # Upload artifacts (ALWAYS visible)
      # ----------------------------
      - name: Upload inventory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solution-inventory
          path: |
            solutions_raw.txt
            solution_inventory.json
            solution_inventory.csv
