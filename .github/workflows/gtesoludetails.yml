name: Export All Solution Details (Inventory + Optional ZIPs)

on:
  workflow_dispatch:
    inputs:
      export_zips:
        description: "Also export all solutions as ZIPs?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      export_managed:
        description: "If exporting ZIPs: export managed solutions too?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      export_unmanaged:
        description: "If exporting ZIPs: export unmanaged solutions too?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  export_solution_details:
    runs-on: windows-latest

    env:
      PP_ENV_URL: "https://org26907746.crm.dynamics.com/"
      PP_CLIENT_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
      PP_TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"
      PP_CLIENT_SECRET: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # ✅ GUARANTEED PAC CLI INSTALL (NO ACTIONS USED)
      # -------------------------------------------------
      - name: Install PAC CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Installing Power Platform CLI..."
          Install-Module Microsoft.PowerApps.CLI -Force -Scope CurrentUser -AllowClobber
