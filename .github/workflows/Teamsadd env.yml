
name: Create Dev Test and Prod Environments

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Base name for environments"
        required: true
        type: string

      user_id:
        description: "AAD Object ID (or UPN) for admin user"
        required: true
        type: string

jobs:
  Create-Environments:
    runs-on: ubuntu-latest
    env:
      RUNNER_DEBUG: 1

    steps:
    - uses: actions/checkout@v3

    # ---------------- DEV ----------------
    - name: Create Developer Environment
      uses: microsoft/powerplatform-actions/create-environment@v1
      with:
        app-id: '4fec5240-fd45-408b-8276-d60c97798c49'
        client-secret: ${{ secrets.PASSWORD }}
        tenant-id: 'db05faca-c82a-4b9d-b9c5-0f64b6755421'
        name: ${{ inputs.env_name }}_Dev
        type: Developer
        domain: ${{ inputs.env_name }}dev

    - name: Assign user to Dev
      uses: microsoft/powerplatform-actions/assign-user@v1
      with:
        app-id: '4fec5240-fd45-408b-8276-d60c97798c49'
        client-secret: ${{ secrets.PASSWORD }}
        tenant-id: 'db05faca-c82a-4b9d-b9c5-0f64b6755421'
        environment: https://${{ inputs.env_name }}dev.crm.dynamics.com
        user: ${{ inputs.user_id }}
        role: System Administrator

    - name: Update Dev environment settings
      shell: bash
      run: |
        pac auth create \
          --tenant "db05faca-c82a-4b9d-b9c5-0f64b6755421" \
          --applicationId "4fec5240-fd45-408b-8276-d60c97798c49" \
          --clientSecret "${{ secrets.PASSWORD }}" \
          --url "https://${{ inputs.env_name }}dev.crm.dynamics.com"

        pac env update-settings \
          --environment "https://${{ inputs.env_name }}dev.crm.dynamics.com" \
          --name blockedattachments \
          --value "exe;bat;cmd;com;vbs;js"

