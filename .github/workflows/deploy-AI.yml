name: release-solution-to-prod

on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: "Solution name (unique name in Dataverse)"
        required: true
        default: "GitHubActionsDevOpsDemo"
      solution_source_folder:
        description: "Repo folder containing the unpacked solution"
        required: true
        default: "solutions"
  release:
    types: [created]

env:
  # === Update these ===
  BUILD_ENVIRONMENT_URL: "https://org26907746.crm.dynamics.com/"
  PRODUCTION_ENVIRONMENT_URL: "https://powerplatcoe-old.crm.dynamics.com/"
  CLIENT_ID: "4fec5240-fd45-408b-8276-d60c97798c49"
  TENANT_ID: "db05faca-c82a-4b9d-b9c5-0f64b6755421"

  # === Output folders (can keep as-is) ===
  OUT_UNMANAGED_DIR: "out/solutions"
  OUT_MANAGED_DIR: "out/ship"
  OUT_RELEASE_DIR: "out/release"

permissions:
  contents: read

jobs:
  convert-to-managed:
    runs-on: windows-latest
    env:
      SOLUTION_NAME: ${{ inputs.solution_name || 'GitHubActionsDevOpsDemo' }}
      SOLUTION_SOURCE_FOLDER: ${{ inputs.solution_source_folder || 'solutions' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install PAC CLI (latest available via dotnet tool)
        shell: pwsh
        run: |
          dotnet tool update --global Microsoft.PowerApps.CLI.Tool
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          pac --version

      - name: Create output folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.OUT_UNMANAGED_DIR }}" | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ env.OUT_MANAGED_DIR }}" | Out-Null

      - name: Pack solution source to Unmanaged ZIP
        shell: pwsh
        run: |
          $src = Join-Path "${{ env.SOLUTION_SOURCE_FOLDER }}" "${{ env.SOLUTION_NAME }}"
          $zip = Join-Path "${{ env.OUT_UNMANAGED_DIR }}" "${{ env.SOLUTION_NAME }}_unmanaged.zip"

          if (!(Test-Path $src)) { throw "Solution source folder not found: $src" }

          pac solution pack `
            --folder  "$src" `
            --zipfile "$zip" `
            --packagetype Unmanaged

          if (!(Test-Path $zip)) { throw "Unmanaged ZIP not created: $zip" }
          Write-Host "Created: $zip"

      - name: Auth to BUILD environment
        shell: pwsh
        env:
          CLIENT_SECRET: ${{ secrets.PowerPlatformSPN }}
        run: |
          pac auth clear
          pac auth create `
            --name "BUILD" `
            --url "${{ env.BUILD_ENVIRONMENT_URL }}" `
            --tenant "${{ env.TENANT_ID }}" `
            --applicationId "${{ env.CLIENT_ID }}" `
            --clientSecret "$env:CLIENT_SECRET"
          pac auth select --name "BUILD"

      - name: Import Unmanaged ZIP into BUILD
        shell: pwsh
        run: |
          $zip = Join-Path "${{ env.OUT_UNMANAGED_DIR }}" "${{ env.SOLUTION_NAME }}_unmanaged.zip"

          pac solution import `
            --path "$zip" `
            --force-overwrite `
            --publish-changes `
            --activate-plugins

      - name: Export solution as Managed from BUILD
        shell: pwsh
        run: |
          $managedZip = Join-Path "${{ env.OUT_MANAGED_DIR }}" "${{ env.SOLUTION_NAME }}_managed.zip"

          pac solution export `
            --name "${{ env.SOLUTION_NAME }}" `
            --path "$managedZip" `
            --managed

          if (!(Test-Path $managedZip)) { throw "Managed ZIP not created: $managedZip" }
          Write-Host "Created: $managedZip"

      - name: Upload managed solution artifact
        uses: actions/upload-artifact@v4
        with:
          name: managedSolutionZip
          path: out/ship/*_managed.zip

  deploy-to-prod:
    needs: [convert-to-managed]
    runs-on: windows-latest
    env:
      SOLUTION_NAME: ${{ inputs.solution_name || 'GitHubActionsDevOpsDemo' }}

    steps:
      - name: Checkout (optional)
        uses: actions/checkout@v4

      - name: Download managed artifact
        uses: actions/download-artifact@v4
        with:
          name: managedSolutionZip
          path: ${{ env.OUT_RELEASE_DIR }}

      - name: List release folder
        shell: pwsh
        run: |
          Get-ChildItem -Path "${{ env.OUT_RELEASE_DIR }}" -Recurse | Format-Table FullName, Length -AutoSize

      - name: Install PAC CLI
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          pac --version

      - name: Auth to PROD environment
        shell: pwsh
        env:
          CLIENT_SECRET: ${{ secrets.PowerPlatformSPN }}
        run: |
          pac auth clear
          pac auth create `
            --name "PROD" `
            --url "${{ env.PRODUCTION_ENVIRONMENT_URL }}" `
            --tenant "${{ env.TENANT_ID }}" `
            --applicationId "${{ env.CLIENT_ID }}" `
            --clientSecret "$env:CLIENT_SECRET"
          pac auth select --name "PROD"

      - name: Import Managed ZIP into PROD
        shell: pwsh
        run: |
          $zip = Join-Path "${{ env.OUT_RELEASE_DIR }}" "${{ env.SOLUTION_NAME }}_managed.zip"
          if (!(Test-Path $zip)) { throw "Managed ZIP not found for import: $zip" }

          pac solution import `
            --path "$zip" `
            --force-overwrite `
            --publish-changes `
            --activate-plugins
