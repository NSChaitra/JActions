name: deploy-solution-to-prod

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  deploy-solution:
    runs-on: windows-latest
        
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    - name: Install Power Platform Tools
      uses: microsoft/powerplatform-actions/actions-install@v1 
    - name: Pack solution
      uses: microsoft/powerplatform-actions/pack-solution@v1
      with:
        solution-folder: 'src/solutions/Unmanaged/GitHubActionsDevOpsDemo'
        solution-file: 'out/solutions/Managed/GitHubActionsDevOpsDemo.zip'
        solution-type: Managed

    - name: Upload artifact store the release solution
      uses: actions/upload-artifact@v4
      with:
        name: managedSolutions
        path: 'out/solutions/Managed/GitHubActionsDevOpsDemo.zip'
        
    - name: Fetch the ready to ship solution from GH artifact store
      uses: actions/download-artifact@v4
      with:
        name: managedSolutions
        path: out/Managed

    - run: get-childitem .\out\Managed
    - name: Install Power Platform Tools
      uses: microsoft/powerplatform-actions/actions-install@v1 
    - name: Import solution as Managed to production environment
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: 'https://powerplatcoe-old.crm.dynamics.com/'
        app-id: '4fec5240-fd45-408b-8276-d60c97798c49'
        client-secret: ${{ secrets.PASSWORD }}
        tenant-id: 'db05faca-c82a-4b9d-b9c5-0f64b6755421'
        solution-file: 'out/Managed/GitHubActionsDevOpsDemo.zip'
        force-overwrite: true
        publish-changes: true
